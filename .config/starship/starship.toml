format = '''
$directory$git_branch
$character'''

palette = 'colors'

[palettes.colors]
primary = '#ffb691'
tertiary = '#cfc890'
subtle = '#d7c2b9'

[character]
success_symbol = '[🞈](tertiary bold)'
error_symbol = '[🞈](red bold)'

[directory]
format = '[$path ](primary)'

[git_branch]
format = '[on ](subtle)[$branch](tertiary)'
