format = '''
$directory$git_branch
$character'''

palette = 'colors'

[palettes.colors]
primary = '#d5bbfc'
tertiary = '#f1b7c3'
subtle = '#cbc4cf'

[character]
success_symbol = '[🞈](tertiary bold)'
error_symbol = '[🞈](red bold)'

[directory]
format = '[$path ](primary)'

[git_branch]
format = '[on ](subtle)[$branch](tertiary)'
