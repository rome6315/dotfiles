format = '''
$directory$git_branch
$character'''

palette = 'colors'

[palettes.colors]
primary = '#80d4dc'
tertiary = '#b7c7ea'
subtle = '#bec8c9'

[character]
success_symbol = '[🞈](tertiary bold)'
error_symbol = '[🞈](red bold)'

[directory]
format = '[$path ](primary)'

[git_branch]
format = '[on ](subtle)[$branch](tertiary)'
