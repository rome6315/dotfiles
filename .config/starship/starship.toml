format = '''
$directory$git_branch
$character'''

palette = 'colors'

[palettes.colors]
primary = '#ebc16c'
tertiary = '#b1cfa8'
subtle = '#d1c5b4'

[character]
success_symbol = '[🞈](tertiary bold)'
error_symbol = '[🞈](red bold)'

[directory]
format = '[$path ](primary)'

[git_branch]
format = '[on ](subtle)[$branch](tertiary)'
