source = colors.conf

general {
  hide_cursor = true
}

# background for lock screen
background {
  monitor = DP-1
  path = screenshot
  blur_size = 2
  blur_passes = 2
}

# make lock screen only display on DP-1
background {
  monitor = DP-2
  color: black
}

# where you type in the password
input-field {
    monitor = DP-1
    size = 300, 50
    outline_thickness = 0 # border thickness
    dots_size = 0.1 # use dots to mask the password being typed
    dots_spacing = 0.3
    outer_color = $tertiary # border
    inner_color = $surface_container # input background
    font_color = $primary # text color
    fade_on_empty = false # whether to show the input field at all times

    position = 0, -100
    halign = center
    valign = center
}

# display time
label {
    monitor = DP-1
    text = cmd[update:1000] echo "$TIME12"
    color = $primary
    font_size = 45
    font_family = Iosevka Nerd Font Bold

    position = 0, 100
    halign = center
    valign = center
}
